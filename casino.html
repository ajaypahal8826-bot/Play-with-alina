<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegas Wheel Mega Win</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .wheel { width: 200px; height: 200px; border-radius: 50%; border: 8px solid #f1c40f; margin: 30px auto; background: conic-gradient(#e74c3c 0% 25%, #2ecc71 25% 50%, #3498db 50% 75%, #f1c40f 75% 100%); transition: transform 3s cubic-bezier(0.1, 1, 0.1, 1); }
        .btn { background: #f1c40f; color: #000; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="games.html" style="color:#aaa;">← Close Wheel</a>
    <h1>🎲 CASINO LUCKY WHEEL</h1>
    <div class="wheel" id="wheel"></div>
    <button class="btn" onclick="spin()">SPIN WHEEL</button>
    <h2 id="win-text" style="color:#2ecc71;"></h2>
    <script>
        function spin() {
            let r = Math.floor(Math.random() * 360) + 1440;
            document.getElementById("wheel").style.transform = `rotate(${r}deg)`;
            setTimeout(() => {
                document.getElementById("win-text").innerText = "🎉 Mega Win Multipier Added!";
            }, 3000);
        }
    </script>
</body>
</html>
