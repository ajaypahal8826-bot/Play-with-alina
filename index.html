<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play with Alina</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#111827,#1f2937);
color:#fff;
text-align:center;
}

header{
padding:20px;
background:#000;
box-shadow:0 0 15px #00ffd5;
}

.logo{
font-size:32px;
font-weight:bold;
color:#00ffd5;
}

.hero{
padding:80px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
color:#ddd;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#00ffd5;
color:#000;
font-size:20px;
font-weight:bold;
border-radius:8px;
text-decoration:none;
transition:.3s;
}

.btn:hover{
background:#00bfa6;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:40px;
}

.card{
width:260px;
background:#1f2937;
padding:20px;
border-radius:12px;
box-shadow:0 0 12px rgba(0,255,213,.3);
}

.card h2{
color:#00ffd5;
margin-bottom:10px;
}

footer{
margin-top:50px;
padding:20px;
background:#000;
}
</style>

</head>

<body>

<header>
<div class="logo">🎮 Play with Alina</div>
</header>

<section class="hero">
<h1>Play. Compete. Win.</h1>
<p>The Future of Online Gaming</p>

<a href="#" class="btn">Start Playing</a>
</section>

<div class="cards">

<div class="card">
<h2>🔥 Hot Games</h2>
<p>Play exciting online games.</p>
</div>

<div class="card">
<h2>🏆 Tournaments</h2>
<p>Compete with players worldwide.</p>
</div>

<div class="card">
<h2>💰 Rewards</h2>
<p>Earn exciting prizes and bonuses.</p>
</div>

</div>

<footer>
© 2026 Play with Alina
</footer>

</body>
</html>
