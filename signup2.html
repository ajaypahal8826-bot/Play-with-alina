<!DOCTYPE html>
<html>
<head>
<title>Sign Up - Play with Alina</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">🎮 Play with Alina</div>
</header>

<section class="hero">
<h1>Create Account</h1>

<form id="signupForm" style="max-width:400px;margin:auto;">

<input id="name" type="text" placeholder="Full Name" style="width:100%;padding:15px;margin:10px 0;">

<input id="email" type="email" placeholder="Email" style="width:100%;padding:15px;margin:10px 0;">

<input id="password" type="password" placeholder="Password" style="width:100%;padding:15px;margin:10px 0;">

<button class="btn" type="submit">Create Account</button>

</form>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCjZk8A8tJvUf4YmIkAy-g3_5YqhvW-3Bc",
authDomain: "playwithalina-d7bb3.firebaseapp.com",
projectId: "playwithalina-d7bb3",
storageBucket: "playwithalina-d7bb3.firebasestorage.app",
messagingSenderId: "18244211359",
appId: "1:18244211359:web:d10be09d3e9fbb184c88aa"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


document.getElementById("signupForm").addEventListener("submit", async(e)=>{

e.preventDefault();

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;


try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

const user = userCredential.user;


await setDoc(doc(db,"users",user.uid),{
name:name,
email:email,
coins:0
});


alert("Account Created Successfully");

window.location.href="login.html";


}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
