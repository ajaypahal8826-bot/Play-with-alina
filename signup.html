<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Alina Vegas Pro</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body {
            background: radial-gradient(circle at center, #140522 0%, #05010a 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-container {
            background: #0d0217;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #ff0077;
            box-shadow: 0 0 30px rgba(255, 0, 119, 0.25);
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        .logo-icon {
            font-size: 50px;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 28px;
            color: #ffcc00;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
            font-weight: 800;
            letter-spacing: 1px;
        }

        p {
            color: #b5b5c3;
            font-size: 14px;
            margin: 0 0 30px 0;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
            position: relative;
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #ff0077;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ff0077;
            background: #05010a;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            box-shadow: 0 0 12px #ff0077;
            outline: none;
            background: #110322;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background: linear-gradient(90deg, #ff0077, #ff5500);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 119, 0.3);
            margin-top: 10px;
        }

        .btn-signup:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(255, 0, 119, 0.5);
        }

        .switch-text {
            margin-top: 25px;
            font-size: 14px;
            color: #aaa;
        }

        .switch-text a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
        }

        .switch-text a:hover {
            text-shadow: 0 0 8px #00ffff;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo-icon"><i class="fa-solid fa-user-plus"></i></div>
    <h2>CREATE ACCOUNT</h2>
    <p>Join Alina Vegas to play and earn rewards</p>

    <form id="signupForm">
        <div class="input-group">
            <label for="fullName">Full Name</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="fullName" placeholder="enter your full name" required>
            </div>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="enter your email" required>
            </div>
        </div>

        <div class="input-group">
            <label for="password">Create Password</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="min 6 characters" minlength="6" required>
            </div>
        </div>

        <button type="submit" class="btn-signup">Register Account</button>
    </form>

    <div class="switch-text">
        Already have an account? <a href="login.html">Log In</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCjZk8A8tJvUf4YmIkAy-g3_5YqhvW-3Bc",
        authDomain: "://firebaseapp.com",
        projectId: "playwithalina-d7bb3",
        storageBucket: "playwithalina-d7bb3.firebasestorage.app",
        messagingSenderId: "18244211359",
        appId: "1:18244211359:web:d10be09d3e9fbb184c88aa"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            // 1. Create User inside Firebase Authentication Layer
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. Set structural document footprint inside Firestore database
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                fullName: fullName,
                email: email,
                walletBalance: 0.00, // Instant empty initialization footprint mapping
                isInDatingPool: false,
                createdAt: serverTimestamp()
            });

            alert("🎉 Account Created Successfully! Welcome to the Arena.");
            window.location.href = "index.html"; // Redirect to Lobby dashboard sheet bounds
        } catch (error) {
            alert("❌ Registration Error: " + error.message);
        }
    });
</script>
</body>
</html>
