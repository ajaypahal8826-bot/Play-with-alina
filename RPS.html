<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors Cash - Earn USD</title>
    <style>
        body { background-color: #0f0f12; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-card { background: #1a1a24; max-width: 450px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); }
        h1 { color: #00ff66; margin-bottom: 5px; }
        .balance-badge { background: #252538; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; color: #ffcc00; }
        .choices { display: flex; justify-content: space-around; margin: 30px 0; pointer-events: none; opacity: 0.5; }
        .choice-btn { font-size: 50px; background: #111; border: 2px solid #333; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .choice-btn:hover { background: #222; border-color: #00ff66; transform: scale(1.1); }
        .btn { background: #00ff66; color: #000; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #00cc52; box-shadow: 0 0 15px #00ff66; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }
        #status-board { font-size: 22px; margin: 15px 0; color: #00ffff; font-weight: bold; }
        .display-moves { display: flex; justify-content: space-around; font-size: 18px; color: #aaa; margin: 15px 0; }
    </style>
</head>
<body>

<div class="game-card">
    <h1>✊ Rock-Paper-Scissors 🖐️</h1>
    <div class="balance-badge">Your Wallet: $<span id="wallet-val">0.00</span></div>
    <div id="status-board">Click Play to Start!</div>
    
    <div class="display-moves">
        <div>You: <span id="user-move">-</span></div>
        <div>Bot: <span id="bot-move">-</span></div>
    </div>

    <!-- Game Choice Buttons -->
    <div class="choices" id="choices-box">
        <button class="choice-btn" data-choice="rock">✊</button>
        <button class="choice-btn" data-choice="paper">🖐️</button>
        <button class="choice-btn" data-choice="scissors">✌️</button>
    </div>
    
    <button class="btn" id="start-btn">Play Game (Entry Fee: $0.10)</button>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, doc, onSnapshot, getDoc, updateDoc, addDoc, collection, serverTimestamp, increment } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged } from "https://gstatic.com";

    // Linked with your project 'playwithalina-d7bb3'
    const firebaseConfig = {
        apiKey: "AIzaSyCjZk8A8tJvUf4YmIkAy-g3_5YqhvW-3Bc",
        authDomain: "://firebaseapp.com",
        projectId: "playwithalina-d7bb3",
        storageBucket: "playwithalina-d7bb3.firebasestorage.app",
        messagingSenderId: "18244211359",
        appId: "1:18244211359:web:d10be09d3e9fbb184c88aa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const choicesBox = document.getElementById('choices-box');
    const startBtn = document.getElementById('start-btn');
    const choiceButtons = document.querySelectorAll('.choice-btn');

    onAuthStateChanged(auth, user => {
        if (user) {
            onSnapshot(doc(db, 'users', user.uid), docSnap => {
                if (docSnap.exists()) {
                    let balance = docSnap.data().walletBalance || 0;
                    document.getElementById('wallet-val').innerText = balance.toFixed(2);
                }
            });
        }
    });

    startBtn.addEventListener('click', payAndStartGame);

    async function payAndStartGame() {
        const user = auth.currentUser;
        if (!user) return alert("Please Login First!");

        const userRef = doc(db, 'users', user.uid);
        const docSnap = await getDoc(userRef);
        const currentBalance = docSnap.data().walletBalance || 0;
        const entryFee = 0.10;

        if (currentBalance < entryFee) return alert("Insufficient Funds! Please deposit money.");

        await updateDoc(userRef, { walletBalance: currentBalance - entryFee });
        await addDoc(collection(db, 'transactions'), {
            userId: user.uid, type: 'RPS Game Entry', amount: entryFee, currency: 'USD', status: 'success', timestamp: serverTimestamp()
        });

        startBtn.disabled = true;
        choicesBox.style.pointerEvents = "auto";
        choicesBox.style.opacity = "1";
        document.getElementById('status-board').innerText = "Make your move!";
        document.getElementById('user-move').innerText = "-";
        document.getElementById('bot-move').innerText = "-";
    }

    choiceButtons.forEach(button => {
        button.addEventListener('click', (e) => {
            const userChoice = button.getAttribute('data-choice');
            choicesBox.style.pointerEvents = "none";
            
            const botChoices = ['rock', 'paper', 'scissors'];
            const botChoice = botChoices[Math.floor(Math.random() * botChoices.length)];

            // Display emojis
            const emojis = { rock: "✊", paper: "🖐️", scissors: "✌️" };
            document.getElementById('user-move').innerText = emojis[userChoice];
            document.getElementById('bot-move').innerText = emojis[botChoice];

            calculateResult(userChoice, botChoice);
        });
    });

    function calculateResult(user, bot) {
        if (user === bot) {
            endGameResult("draw");
        } else if (
            (user === "rock" && bot === "scissors") ||
            (user === "paper" && bot === "rock") ||
            (user === "scissors" && bot === "paper")
        ) {
            endGameResult("win");
        } else {
            endGameResult("lose");
        }
    }

    async function endGameResult(result) {
        startBtn.disabled = false;
        choicesBox.style.opacity = "0.5";
        const user = auth.currentUser;

        if (result === "win") {
            const prize = 0.25;
            document.getElementById('status-board').innerText = "🎉 You Won $0.25!";
            alert("Congratulations! You won!");
            
            await updateDoc(doc(db, 'users', user.uid), { walletBalance: increment(prize) });
            await addDoc(collection(db, 'transactions'), {
                userId: user.uid, type: 'RPS Game Win', amount: prize, currency: 'USD', status: 'success', timestamp: serverTimestamp()
            });
        } else if (result === "lose") {
            document.getElementById('status-board').innerText = "💀 Bot Won! Try Again.";
            alert("Game Over! Bot won this round.");
        } else {
            document.getElementById('status-board').innerText = "🤝 Match Draw!";
            alert("It's a tie!");
        }
    }
</script>
</body>
</html>
